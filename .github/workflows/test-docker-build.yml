---
name: "Test Docker Build"

on:
    workflow_dispatch:
    push:
        paths:
            - ".github/workflows/test-docker-build.yml"
            - "Dockerfile"
            - ".dockerignore"
            - "scripts/**"
            - "pyproject.toml"
            - "uv.lock"
        branches:
            - main
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
        paths:
            - ".github/workflows/test-docker-build.yml"
            - "Dockerfile"
            - ".dockerignore"
            - "scripts/**"
            - "pyproject.toml"
            - "uv.lock"

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    test-build-container:
        if: ${{ !contains(github.event.head_commit.message, 'bump(release)') }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Build amd64 image for smoke testing
              uses: docker/build-push-action@v7
              with:
                  context: .
                  platforms: linux/amd64
                  load: true
                  tags: cartlog:ci-test

            - name: Verify cartlog binary is available
              run: docker run --rm --entrypoint="" cartlog:ci-test which cartlog

            - name: Verify cartlog package imports
              run: docker run --rm --entrypoint="" cartlog:ci-test python -c "import cartlog; from cartlog.web.app import create_app"

            - name: Verify cartlog CLI runs
              run: docker run --rm --entrypoint="" cartlog:ci-test cartlog --help

            - name: Verify compiled app.css is present
              run: docker run --rm --entrypoint="" cartlog:ci-test test -s /app/src/cartlog/web/static/app.css

            - name: Build multi-arch Docker image
              uses: docker/build-push-action@v7
              with:
                  context: .
                  platforms: linux/amd64,linux/arm64
                  outputs: type=cacheonly
                  tags: cartlog:latest
