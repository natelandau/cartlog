---
name: "Reusable Tests"

on:
    workflow_call:
        inputs:
            run-coverage:
                description: "Run coverage"
                required: false
                type: boolean
                default: false

jobs:
    test-python-code:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: true
            matrix:
                python-version: ["3.14"]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Setup Python, uv, and the package
              uses: ./.github/actions/setup_python_env
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Run tests
              shell: bash
              run: |
                  uv run pytest tests/ src/ --config-file pyproject.toml --color=yes --cov --cov-config=pyproject.toml --cov-report=xml --cov-report=term

            - name: Upload coverage to Codecov
              if: ${{ inputs.run-coverage && matrix.python-version == '3.14' }}
              uses: codecov/codecov-action@v7
              with:
                  files: .cache/coverage.xml
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    lint-project:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - uses: actions/cache@v6
              with:
                  path: ~/.cache/prek
                  key: prek-${{ hashFiles('.pre-commit-config.yaml') }}

            - name: Setup Python, uv, and the package
              uses: ./.github/actions/setup_python_env

            - name: run all linters
              shell: bash
              run: uv run duty lint

    e2e-tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Setup Python, uv, and the package
              uses: ./.github/actions/setup_python_env
              with:
                  python-version: "3.14"

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: "20"

            - name: Install Node deps and build the stylesheet
              shell: bash
              run: |
                  npm ci
                  npm run build:css

            - name: Install the Playwright browser
              shell: bash
              run: uv run playwright install --with-deps chromium

            - name: Run browser e2e tests
              shell: bash
              run: uv run pytest -m e2e tests/e2e --config-file pyproject.toml --color=yes
