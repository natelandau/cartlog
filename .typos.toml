[default]
    locale = "en-us"

    [default.extend-words]
        criticals = "criticals"
        # British spelling variants used as alias keys in units.py for Commonwealth receipts
        litre = "litre"
        litres = "litres"
        millilitre = "millilitre"
        millilitres = "millilitres"

[files]
    extend-exclude = [
        "*_cache",
        ".env.secrets",
        ".venv",
        "CHANGELOG.md",
        "fixtures",
        "scripts/install_certifi.py",
        "static",
    ]
