{% import "macros/ui.html" as ui with context %}
<div id="access-settings">
  <form hx-post="/admin/settings/access" hx-target="#access-settings" hx-swap="outerHTML" class="space-y-5">

    {% if access_saved %}
    <div role="status" class="alert alert-success alert-soft py-2 text-sm">
      {{ ui.icon('check', 16) }}
      <span>Access settings saved.</span>
    </div>
    {% endif %}

    {# Radio pair: label on the left describes the posture, radio on the right is the control. #}
    <label class="flex cursor-pointer items-start justify-between gap-4">
      <span>
        <span class="block font-medium">Open</span>
        <span class="block text-sm text-base-content/60">Anyone on your network can browse, search, and export. Editing still requires signing in.</span>
      </span>
      <input type="radio" name="posture" value="open" class="radio radio-primary mt-1"
             {% if allow_anonymous_read %}checked{% endif %} />
    </label>

    <div class="divider my-0"></div>

    <label class="flex cursor-pointer items-start justify-between gap-4">
      <span>
        <span class="block font-medium">Private</span>
        <span class="block text-sm text-base-content/60">Require sign-in to view anything.</span>
      </span>
      <input type="radio" name="posture" value="private" class="radio radio-primary mt-1"
             {% if not allow_anonymous_read %}checked{% endif %} />
    </label>

    <p class="text-sm text-base-content/60">You can change this anytime.</p>

    <div class="flex justify-end">
      <button type="submit" class="btn btn-primary">Save changes</button>
    </div>
  </form>
</div>
