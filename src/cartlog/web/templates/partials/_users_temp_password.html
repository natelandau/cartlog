{% from "macros/ui.html" import table_card %}
<div id="admin-users">
  <div role="alert" class="alert alert-warning mb-6">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M12 2a10 10 0 110 20A10 10 0 0112 2z"/></svg>
    <div>
      <p class="font-semibold">Temporary password for <span class="font-mono">{{ user.username }}</span></p>
      <p class="mt-1">Share this password with the user. It will not be shown again.</p>
      <p class="mt-2 rounded bg-base-100/60 px-3 py-1 font-mono text-lg tracking-widest">{{ temp_password }}</p>
      <p class="mt-1 text-sm">The user must change their password on next login. All their existing sessions have been signed out.</p>
    </div>
  </div>
  <div class="mb-4">
    <button class="btn btn-sm btn-outline"
      hx-get="/admin/users"
      hx-target="#admin-users"
      hx-swap="outerHTML">
      Back to user list
    </button>
  </div>
</div>
